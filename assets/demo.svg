<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="dbg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d1628"/>
      <stop offset="100%" stop-color="#0a1020"/>
    </linearGradient>
    <linearGradient id="barGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="barYellow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#eab308"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="barRed" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <filter id="redglow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="greenglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="url(#dbg)" rx="10"/>

  <!-- Top bar -->
  <rect width="800" height="40" fill="#111827" rx="10"/>
  <rect x="0" y="30" width="800" height="10" fill="#111827"/>
  <circle cx="18" cy="20" r="5" fill="#ff5f56"/>
  <circle cx="36" cy="20" r="5" fill="#ffbd2e"/>
  <circle cx="54" cy="20" r="5" fill="#27c93f"/>
  <text x="400" y="25" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="12" font-weight="600">AeneasSoft — Safe Pause &amp; Resume</text>

  <!-- Divider line -->
  <line x1="370" y1="50" x2="370" y2="390" stroke="#1e293b" stroke-width="1"/>

  <!-- ═══════ LEFT PANEL: Code ═══════ -->
  <rect x="15" y="50" width="345" height="22" rx="4" fill="#1e293b"/>
  <text x="25" y="65" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10" font-weight="600">agent.py</text>

  <!-- Code block - appears line by line -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.3s" fill="freeze"/>
    <text x="25" y="90" fill="#c084fc" font-family="monospace" font-size="11">import</text>
    <text x="72" y="90" fill="#e2e8f0" font-family="monospace" font-size="11">agentwatch</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.6s" fill="freeze"/>
    <text x="25" y="107" fill="#e2e8f0" font-family="monospace" font-size="11">agentwatch.</text>
    <text x="107" y="107" fill="#fbbf24" font-family="monospace" font-size="11">init</text>
    <text x="131" y="107" fill="#e2e8f0" font-family="monospace" font-size="11">(</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.9s" fill="freeze"/>
    <text x="40" y="122" fill="#38bdf8" font-family="monospace" font-size="11">budget_per_hour</text>
    <text x="170" y="122" fill="#e2e8f0" font-family="monospace" font-size="11">=</text>
    <text x="180" y="122" fill="#f59e0b" font-family="monospace" font-size="11">10.0</text>
    <text x="210" y="122" fill="#e2e8f0" font-family="monospace" font-size="11">,</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.1s" fill="freeze"/>
    <text x="40" y="137" fill="#38bdf8" font-family="monospace" font-size="11">block_on_threshold</text>
    <text x="195" y="137" fill="#e2e8f0" font-family="monospace" font-size="11">=</text>
    <text x="205" y="137" fill="#c084fc" font-family="monospace" font-size="11">True</text>
    <text x="237" y="137" fill="#e2e8f0" font-family="monospace" font-size="11">,</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.3s" fill="freeze"/>
    <text x="40" y="152" fill="#38bdf8" font-family="monospace" font-size="11">on_block</text>
    <text x="107" y="152" fill="#e2e8f0" font-family="monospace" font-size="11">=</text>
    <text x="117" y="152" fill="#4ade80" font-family="monospace" font-size="11">save_state</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.5s" fill="freeze"/>
    <text x="25" y="167" fill="#e2e8f0" font-family="monospace" font-size="11">)</text>
  </g>

  <!-- Trace output rows -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.2s" begin="2.0s" fill="freeze"/>
    <text x="25" y="192" fill="#64748b" font-family="monospace" font-size="10"># output:</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.2s" begin="2.2s" fill="freeze"/>
    <circle cx="30" cy="207" r="3" fill="#22c55e"/>
    <text x="40" y="210" fill="#94a3b8" font-family="monospace" font-size="10">Bot-1  gpt-4o  1.2k tok</text>
    <text x="330" y="210" fill="#22c55e" font-family="monospace" font-size="10" text-anchor="end">$0.03</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.2s" begin="2.5s" fill="freeze"/>
    <circle cx="30" cy="222" r="3" fill="#22c55e"/>
    <text x="40" y="225" fill="#94a3b8" font-family="monospace" font-size="10">Bot-1  gpt-4o  2.4k tok</text>
    <text x="330" y="225" fill="#22c55e" font-family="monospace" font-size="10" text-anchor="end">$0.05</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.2s" begin="2.8s" fill="freeze"/>
    <circle cx="30" cy="237" r="3" fill="#eab308"/>
    <text x="40" y="240" fill="#94a3b8" font-family="monospace" font-size="10">Bot-1  gpt-4o  4.1k tok</text>
    <text x="330" y="240" fill="#eab308" font-family="monospace" font-size="10" text-anchor="end">$0.12</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.2s" begin="3.2s" fill="freeze"/>
    <circle cx="30" cy="252" r="3" fill="#f59e0b"/>
    <text x="40" y="255" fill="#f59e0b" font-family="monospace" font-size="10">... 844 more calls (loop)</text>
  </g>

  <!-- Blocked line -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="4.0s" fill="freeze"/>
    <rect x="20" y="263" width="340" height="20" rx="3" fill="#2d1215"/>
    <circle cx="30" cy="273" r="3" fill="#ef4444"/>
    <text x="40" y="276" fill="#fca5a5" font-family="monospace" font-size="10" font-weight="700">CircuitBreakerException</text>
    <rect x="225" y="266" width="55" height="14" rx="7" fill="#ef4444" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.2s" begin="4.2s" fill="freeze"/>
    </rect>
    <text x="252" y="276" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="9" font-weight="800" opacity="0">
      BLOCKED
      <animate attributeName="opacity" values="0;1" dur="0.2s" begin="4.2s" fill="freeze"/>
    </text>
  </g>

  <!-- Recovery line -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="5.0s" fill="freeze"/>
    <rect x="20" y="287" width="340" height="18" rx="3" fill="#0f2918"/>
    <text x="30" y="299" fill="#4ade80" font-family="monospace" font-size="10">e.monitor.</text>
    <text x="108" y="299" fill="#fbbf24" font-family="monospace" font-size="10">pause</text>
    <text x="140" y="299" fill="#4ade80" font-family="monospace" font-size="10">(60)</text>
    <text x="180" y="299" fill="#64748b" font-family="monospace" font-size="10"># resume in 60s</text>
  </g>

  <!-- ═══════ RIGHT PANEL: Budget Gauge ═══════ -->
  <rect x="385" y="50" width="400" height="105" rx="6" fill="#1e293b"/>
  <text x="400" y="70" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11" font-weight="600">HOURLY BUDGET</text>
  <text x="770" y="70" text-anchor="end" fill="#64748b" font-family="monospace" font-size="10">limit: $10.00</text>

  <!-- Budget bar background -->
  <rect x="400" y="80" width="370" height="18" rx="9" fill="#0f172a"/>

  <!-- Budget bar fill - animates green → yellow → red -->
  <rect x="400" y="80" width="0" height="18" rx="9" fill="url(#barGreen)">
    <animate attributeName="width" values="0;100" dur="1.5s" begin="2.0s" fill="freeze"/>
  </rect>
  <rect x="400" y="80" width="0" height="18" rx="9" fill="url(#barYellow)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.1s" begin="2.8s" fill="freeze"/>
    <animate attributeName="width" values="100;250" dur="1s" begin="2.8s" fill="freeze"/>
  </rect>
  <rect x="400" y="80" width="0" height="18" rx="9" fill="url(#barRed)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.1s" begin="3.5s" fill="freeze"/>
    <animate attributeName="width" values="250;370" dur="0.6s" begin="3.5s" fill="freeze"/>
  </rect>

  <!-- Budget amount -->
  <text x="400" y="125" fill="#22c55e" font-family="monospace" font-size="20" font-weight="700">$0.00
    <animate attributeName="opacity" values="1;0" dur="0.01s" begin="2.2s" fill="freeze"/>
  </text>
  <text x="400" y="125" fill="#22c55e" font-family="monospace" font-size="20" font-weight="700" opacity="0">$3.12
    <animate attributeName="opacity" values="0;1" dur="0.01s" begin="2.2s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0" dur="0.01s" begin="2.8s" fill="freeze"/>
  </text>
  <text x="400" y="125" fill="#eab308" font-family="monospace" font-size="20" font-weight="700" opacity="0">$7.25
    <animate attributeName="opacity" values="0;1" dur="0.01s" begin="2.8s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0" dur="0.01s" begin="3.5s" fill="freeze"/>
  </text>
  <text x="400" y="125" fill="#ef4444" font-family="monospace" font-size="20" font-weight="700" opacity="0">$10.42
    <animate attributeName="opacity" values="0;1" dur="0.2s" begin="3.5s" fill="freeze"/>
  </text>
  <text x="500" y="125" fill="#64748b" font-family="monospace" font-size="11" opacity="0">/ $10.00
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.2s" fill="freeze"/>
  </text>

  <!-- ═══════ RIGHT PANEL: Stats ═══════ -->
  <rect x="385" y="165" width="193" height="68" rx="6" fill="#1e293b"/>
  <text x="400" y="183" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">CALLS / MIN</text>
  <text x="400" y="210" fill="#e2e8f0" font-family="monospace" font-size="20" font-weight="700">0
    <animate attributeName="opacity" values="1;0" dur="0.01s" begin="2.2s" fill="freeze"/>
  </text>
  <text x="400" y="210" fill="#e2e8f0" font-family="monospace" font-size="20" font-weight="700" opacity="0">124
    <animate attributeName="opacity" values="0;1" dur="0.01s" begin="2.2s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0" dur="0.01s" begin="3.2s" fill="freeze"/>
  </text>
  <text x="400" y="210" fill="#eab308" font-family="monospace" font-size="20" font-weight="700" opacity="0">847
    <animate attributeName="opacity" values="0;1" dur="0.01s" begin="3.2s" fill="freeze"/>
  </text>

  <rect x="588" y="165" width="197" height="68" rx="6" fill="#1e293b"/>
  <text x="603" y="183" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">ERROR RATE</text>
  <text x="603" y="210" fill="#22c55e" font-family="monospace" font-size="20" font-weight="700">2.1%
    <animate attributeName="opacity" values="1;0" dur="0.01s" begin="3.2s" fill="freeze"/>
  </text>
  <text x="603" y="210" fill="#eab308" font-family="monospace" font-size="20" font-weight="700" opacity="0">12.4%
    <animate attributeName="opacity" values="0;1" dur="0.01s" begin="3.2s" fill="freeze"/>
  </text>

  <!-- ═══════ RIGHT PANEL: BLOCKED → PAUSED ═══════ -->

  <!-- Red flash border -->
  <rect x="0" y="0" width="800" height="420" rx="10" fill="none" stroke="#ef4444" stroke-width="3" opacity="0">
    <animate attributeName="opacity" values="0;0.7;0.3" dur="0.5s" begin="4.0s" fill="freeze"/>
    <animate attributeName="opacity" values="0.3;0" dur="0.5s" begin="5.0s" fill="freeze"/>
  </rect>

  <!-- BLOCKED panel -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="4.3s" fill="freeze"/>
    <rect x="385" y="245" width="400" height="70" rx="6" fill="#1a0505" stroke="#ef4444" stroke-width="1"/>
    <g transform="translate(400, 255)">
      <path d="M8 0 L16 5 L16 12 C16 19 8 23 8 23 C8 23 0 19 0 12 L0 5 Z" fill="none" stroke="#ef4444" stroke-width="1.5"/>
      <line x1="5" y1="11" x2="7" y2="14" stroke="#ef4444" stroke-width="1.5"/>
      <line x1="7" y1="14" x2="12" y2="8" stroke="#ef4444" stroke-width="1.5"/>
    </g>
    <text x="425" y="270" fill="#ef4444" font-family="system-ui, sans-serif" font-size="13" font-weight="800" filter="url(#redglow)">REQUEST BLOCKED</text>
    <text x="400" y="288" fill="#fca5a5" font-family="monospace" font-size="10">Budget exceeded: $10.42 / $10.00</text>
    <text x="400" y="303" fill="#fca5a5" font-family="monospace" font-size="10">Blocked in RAM. $0.00 wasted.</text>
  </g>

  <!-- PAUSED indicator (appears after block) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="5.2s" fill="freeze"/>
    <rect x="385" y="322" width="400" height="32" rx="6" fill="#1a2332" stroke="#f59e0b" stroke-width="1"/>
    <text x="405" y="342" fill="#f59e0b" font-family="monospace" font-size="11" font-weight="600">PAUSED</text>
    <text x="462" y="342" fill="#94a3b8" font-family="monospace" font-size="11">probe in 60s</text>
    <text x="770" y="342" text-anchor="end" fill="#4ade80" font-family="monospace" font-size="10" filter="url(#greenglow)">state saved</text>
  </g>

  <!-- ═══════ BOTTOM STATUS BAR ═══════ -->
  <rect x="0" y="390" width="800" height="30" fill="#111827" rx="0"/>
  <rect x="0" y="390" width="800" height="1" fill="#1e293b"/>

  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="5.5s" fill="freeze"/>
    <circle cx="25" cy="405" r="4" fill="#22c55e">
      <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="38" y="409" fill="#94a3b8" font-family="monospace" font-size="11">847 monitored</text>
    <text x="168" y="409" fill="#64748b" font-family="monospace" font-size="11">|</text>
    <text x="180" y="409" fill="#eab308" font-family="monospace" font-size="11">$10.42 tracked</text>
    <text x="318" y="409" fill="#64748b" font-family="monospace" font-size="11">|</text>
    <text x="330" y="409" fill="#ef4444" font-family="monospace" font-size="11" font-weight="600">1 blocked</text>
    <text x="418" y="409" fill="#64748b" font-family="monospace" font-size="11">|</text>
    <text x="430" y="409" fill="#f59e0b" font-family="monospace" font-size="11" font-weight="600">1 paused</text>
    <text x="520" y="409" fill="#64748b" font-family="monospace" font-size="11">|</text>
    <text x="532" y="409" fill="#22c55e" font-family="monospace" font-size="11" font-weight="600">$0.00 wasted</text>
    <text x="770" y="409" fill="#64748b" font-family="monospace" font-size="10" text-anchor="end">aeneassoft.com</text>
  </g>
</svg>
