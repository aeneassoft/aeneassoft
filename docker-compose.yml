services:
  clickhouse:
    image: clickhouse/clickhouse-server:23.8
    # Expose only on localhost — not accessible from outside the host machine
    ports: ["127.0.0.1:8123:8123", "127.0.0.1:9000:9000"]
    environment:
      CLICKHOUSE_DB: "productname"
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    deploy:
      resources:
        limits:
          memory: 1g
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:15-alpine
    ports: ["127.0.0.1:5432:5432"]
    environment:
      POSTGRES_DB: "productname"
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    ports: ["127.0.0.1:9092:9092"]
    environment:
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms256m"
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://kafka:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports: ["3001:3001"]
    environment:
      CLICKHOUSE_URL: "http://clickhouse:8123"
      CLICKHOUSE_DB: "productname"
      POSTGRES_URL: "postgresql://postgres:postgres@postgres:5432/productname"
      KAFKA_BROKERS: "kafka:9092"
      ZERO_DATA_RETENTION: "false"
      DATA_RETENTION_DAYS: "30"
    depends_on:
      clickhouse: { condition: service_healthy }
      postgres: { condition: service_healthy }
      kafka: { condition: service_healthy }

  proxy:
    build:
      context: .
      dockerfile: proxy/Dockerfile
    ports: ["8080:8080"]
    environment:
      KAFKA_BROKERS: "kafka:9092"
      UPSTREAM_OPENAI_URL: "https://api.openai.com"
      UPSTREAM_ANTHROPIC_URL: "https://api.anthropic.com"
      ZERO_DATA_RETENTION: "false"
    depends_on:
      kafka: { condition: service_healthy }

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports: ["3000:3000"]
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:3001"
    depends_on:
      - backend

volumes:
  clickhouse_data:
  postgres_data:
